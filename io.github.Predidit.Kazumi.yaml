id: io.github.Predidit.Kazumi
# This app needs libwebkit2gtk-4.1 to work properly.
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: kazumi
finish-args:
  # x11 needs ipc permission.
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  # Flutter needs GPU permission.
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --own-name=org.mpris.MediaPlayer2.io.github.predidit.kazumi.*
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.ScreenSaver
modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - name: kazumi
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/Predidit/Kazumi/releases/download/2.1.6/Kazumi_linux_2.1.6_amd64.deb
        sha256: d865e2e23cc6c8ef43b9f47ea6158ca6d34cce388bbe04cb14bd6a5fbe8f7823
        only-arches: [x86_64]
        dest-filename: Kazumi.deb
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Predidit/Kazumi/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name | contains("linux") and contains("amd64.deb"))
            | .browser_download_url
      - type: file
        url: https://github.com/Predidit/Kazumi/releases/download/2.1.6/Kazumi_linux_2.1.6_arm64.deb
        sha256: 9aec2d8868df1beecc46fbf97302ade6c67ed8adae20208c73f2271183246c81
        only-arches: [aarch64]
        dest-filename: Kazumi.deb
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Predidit/Kazumi/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name | contains("linux") and contains("arm64.deb"))
            | .browser_download_url
      - type: file
        path: io.github.Predidit.Kazumi.metainfo.xml
      - type: script
        commands:
          - export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
          - /app/Kazumi/kazumi "$@"
        dest-filename: kazumi.sh
    build-commands:
      # Unzip deb package
      - bsdtar --to-stdout -xf Kazumi.deb data.tar.zst | bsdtar -xf -
      # Install binaries
      - cp -r opt/Kazumi ${FLATPAK_DEST}/
      - cp -r usr/share ${FLATPAK_DEST}/
      - install -Dm755 kazumi.sh ${FLATPAK_DEST}/bin/kazumi
      # Install AppStream file
      - install -Dm644 io.github.Predidit.Kazumi.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/
